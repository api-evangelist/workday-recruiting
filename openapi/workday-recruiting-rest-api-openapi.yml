      properties:
        jobApplication:
          $ref: '#/components/schemas/Reference'
          description: Job application being evaluated
        interviewType:
          type: string
          enum:
            - Phone Screen
            - Video Interview
            - In-Person Interview
            - Panel Interview
            - Technical Interview
          description: Type of interview
        scheduledDate:
          type: string
          format: date
          description: Scheduled date of the interview
        startTime:
          type: string
          format: time
          description: Start time
        endTime:
          type: string
          format: time
          description: End time
        interviewers:
          type: array
          items:
            $ref: '#/components/schemas/Reference'
