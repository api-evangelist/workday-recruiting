openapi: 3.1.0
info:
  title: Workday Recruiting REST API
  description: >-
    RESTful API for managing recruiting operations within Workday Human Capital
    Management. Provides programmatic access to job requisitions, candidates,
    job applications, job postings, interviews, and hiring workflows. Supports
    integration with external talent management and applicant tracking systems
    using OAuth 2.0 authentication and JSON data format.
  version: v41.2
  contact:
    name: Workday Support
    url: https://www.workday.com/en-us/services/support.html
  termsOfService: https://www.workday.com/en-us/legal.html
externalDocs:
  description: Workday Recruiting REST API Documentation
  url: https://community.workday.com/sites/default/files/file-hosting/restapi/index.html
servers:
  - url: https://{tenant}.workday.com/ccx/api/recruiting/v41.2
    description: Workday Recruiting Production
    variables:
      tenant:
        description: Workday tenant identifier (e.g., wd2-impl-services1)
        default: your-tenant
tags:
  - name: Job Requisitions
    description: >-
      Create, retrieve, edit, close, freeze, and manage job requisitions for
      open positions within Workday recruiting workflows.
  - name: Evergreen Requisitions
    description: >-
      Manage evergreen requisitions used for ongoing hiring needs without a
      specific number of openings or close date.
  - name: Candidates
    description: >-
      Create, retrieve, and update candidate profiles including personal
      information, attachments, photos, and assessment data.
  - name: Job Applications
    description: >-
      Manage the lifecycle of job applications from submission through
      disposition, including stage movement and offer initiation.
  - name: Job Postings
    description: >-
      Post, update, and unpost jobs to internal and external career sites,
      and manage job posting site configurations.
  - name: Interviews
    description: >-
      Schedule interviews, submit interview feedback, manage interview
      settings, and configure self-schedule calendars.
  - name: Background Checks
    description: >-
      Submit and retrieve background check results and manage background
      check packages for candidate screening.
  - name: Recruiting Agencies
    description: >-
      Manage recruiting agency relationships, agency users, and agency
      candidate submissions.
  - name: Applicants
    description: >-
      Retrieve and manage pre-hire and applicant records, including
      high-volume applicant import operations.
  - name: Positions
    description: >-
      Create and manage positions and position restrictions within the
      position management staffing model.
  - name: Configuration
    description: >-
      Manage recruiting configuration settings including questionnaires,
      assessment categories, veteran statuses, site brands, and regions.
security:
  - oauth2: []
paths:
  /jobRequisitions:
    get:
      operationId: listJobRequisitions
      summary: Workday Recruiting List job requisitions
      description: >-
        Retrieve a collection of job requisitions with optional filtering by
        status, supervisory organization, job profile, or date range. Returns
        requisition details including position references, hiring manager,
        recruiting status, and associated job postings.
      tags:
        - Job Requisitions
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - name: status
          in: query
          description: >-
            Filter job requisitions by recruiting status
          schema:
            type: string
            enum:
              - Open
              - Filled
              - Frozen
              - Closed
              - Draft
        - name: supervisoryOrganization
          in: query
          description: >-
            Filter by supervisory organization Workday ID
          schema:
            type: string
        - name: updatedFrom
          in: query
          description: >-
            Return requisitions updated on or after this date-time
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Job requisitions retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    description: Total number of matching job requisitions
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/JobRequisition'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createJobRequisition
      summary: Workday Recruiting Create a job requisition
      description: >-
        Create a new job requisition for a position within a supervisory
        organization. The requisition defines the hiring need including job
        profile, number of openings, compensation details, and required
        qualifications.
      tags:
        - Job Requisitions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobRequisitionCreate'
      responses:
        '201':
          description: Job requisition created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobRequisition'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /jobRequisitions/{id}:
    get:
      operationId: getJobRequisition
      summary: Workday Recruiting Get a job requisition
      description: >-
        Retrieve detailed information for a specific job requisition including
        position reference, hiring manager, job profile, compensation range,
        recruiting status, and associated job postings.
      tags:
        - Job Requisitions
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Job requisition retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobRequisition'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: editJobRequisition
      summary: Workday Recruiting Edit a job requisition
      description: >-
        Update an open job requisition. Allows modification of job profile,
        number of openings, compensation details, qualifications, and other
        requisition attributes.
      tags:
        - Job Requisitions
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobRequisitionCreate'
      responses:
        '200':
          description: Job requisition updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobRequisition'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /jobRequisitions/{id}/close:
    post:
      operationId: closeJobRequisition
      summary: Workday Recruiting Close a job requisition
      description: >-
        Close a job requisition that has no pending events or filled status.
        Closing a requisition prevents new applications from being submitted
        and removes associated job postings.
      tags:
        - Job Requisitions
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                closeReason:
                  $ref: '#/components/schemas/Reference'
                  description: Reason for closing the requisition
      responses:
        '200':
          description: Job requisition closed successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /jobRequisitions/{id}/freeze:
    post:
      operationId: manageJobRequisitionFreeze
      summary: Workday Recruiting Freeze or unfreeze a job requisition
      description: >-
        Freeze or unfreeze a job requisition to temporarily halt or resume
        recruiting activity. Freezing a requisition pauses the hiring process
        without closing the requisition.
      tags:
        - Job Requisitions
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - freeze
              properties:
                freeze:
                  type: boolean
                  description: Set to true to freeze, false to unfreeze
                reason:
                  type: string
                  description: Reason for freezing or unfreezing the requisition
      responses:
        '200':
          description: Job requisition freeze status updated successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /evergreenRequisitions:
    get:
      operationId: listEvergreenRequisitions
      summary: Workday Recruiting List evergreen requisitions
      description: >-
        Retrieve a collection of evergreen requisitions. Evergreen requisitions
        represent ongoing hiring needs without a specific number of openings
        or anticipated close date.
      tags:
        - Evergreen Requisitions
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: Evergreen requisitions retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    description: Total number of matching evergreen requisitions
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/EvergreenRequisition'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createEvergreenRequisition
      summary: Workday Recruiting Create an evergreen requisition
      description: >-
        Create a new evergreen requisition for ongoing hiring needs. Evergreen
        requisitions remain open indefinitely and can be linked to standard
        job requisitions for candidate pipeline management.
      tags:
        - Evergreen Requisitions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvergreenRequisitionCreate'
      responses:
        '201':
          description: Evergreen requisition created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvergreenRequisition'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /evergreenRequisitions/{id}:
    get:
      operationId: getEvergreenRequisition
      summary: Workday Recruiting Get an evergreen requisition
      description: >-
        Retrieve detailed information for a specific evergreen requisition
        including position reference, linked job requisitions, and
        candidate pipeline status.
      tags:
        - Evergreen Requisitions
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Evergreen requisition retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvergreenRequisition'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /evergreenRequisitions/{id}/close:
    post:
      operationId: closeEvergreenRequisition
      summary: Workday Recruiting Close an evergreen requisition
      description: >-
        Close an evergreen requisition that has no pending events. Closing
        removes the requisition from active recruiting workflows.
      tags:
        - Evergreen Requisitions
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Evergreen requisition closed successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /candidates:
    get:
      operationId: listCandidates
      summary: Workday Recruiting List candidates
      description: >-
        Retrieve a collection of candidates with optional filtering. Returns
        candidate profile information including name, contact details, source,
        and associated job applications.
      tags:
        - Candidates
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - name: updatedFrom
          in: query
          description: >-
            Return candidates updated on or after this date-time
          schema:
            type: string
            format: date-time
        - name: name
          in: query
          description: >-
            Filter candidates by name (partial match supported)
          schema:
            type: string
        - name: email
          in: query
          description: >-
            Filter candidates by email address
          schema:
            type: string
            format: email
      responses:
        '200':
          description: Candidates retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    description: Total number of matching candidates
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Candidate'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createCandidate
      summary: Workday Recruiting Create a candidate
      description: >-
        Add a new candidate record to the Workday recruiting system. Includes
        personal information, contact details, and optionally associates the
        candidate with a job application.
      tags:
        - Candidates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CandidateCreate'
      responses:
        '201':
          description: Candidate created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Candidate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /candidates/{id}:
    get:
      operationId: getCandidate
      summary: Workday Recruiting Get a candidate
      description: >-
        Retrieve detailed information for a specific candidate including
        personal information, contact details, source, tags, and associated
        job applications.
      tags:
        - Candidates
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Candidate retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Candidate'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateCandidate
      summary: Workday Recruiting Update a candidate
      description: >-
        Update an existing candidate record with new personal information,
        contact details, or other profile attributes.
      tags:
        - Candidates
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CandidateCreate'
      responses:
        '200':
          description: Candidate updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Candidate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /candidates/{id}/attachments:
    get:
      operationId: listCandidateAttachments
      summary: Workday Recruiting List candidate attachments
      description: >-
        Retrieve attachments associated with a candidate, including resumes,
        cover letters, and other supporting documents.
      tags:
        - Candidates
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Candidate attachments retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Attachment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: addCandidateAttachment
      summary: Workday Recruiting Add a candidate attachment
      description: >-
        Upload an attachment such as a resume, cover letter, or portfolio
        document to a candidate record.
      tags:
        - Candidates
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - category
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload
                category:
                  type: string
                  description: Attachment category (e.g., Resume, Cover Letter)
                  enum:
                    - Resume
                    - Cover Letter
                    - Portfolio
                    - Other
      responses:
        '201':
          description: Attachment uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /candidates/{id}/photo:
    get:
      operationId: getCandidatePhoto
      summary: Workday Recruiting Get a candidate photo
      description: >-
        Retrieve the photo associated with a candidate record.
      tags:
        - Candidates
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Candidate photo retrieved successfully
          content:
            image/*:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateCandidatePhoto
      summary: Workday Recruiting Update a candidate photo
      description: >-
        Upload or replace the photo for a candidate record.
      tags:
        - Candidates
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          image/*:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Candidate photo updated successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /candidates/{id}/assess:
    post:
      operationId: assessCandidate
      summary: Workday Recruiting Assess a candidate
      description: >-
        Create or modify a candidate assessment and optionally advance the
        candidate through job application stages based on the assessment
        outcome.
      tags:
        - Candidates
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CandidateAssessment'
      responses:
        '200':
          description: Candidate assessment submitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateAssessment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /candidates/{id}/refer:
    post:
      operationId: referCandidate
      summary: Workday Recruiting Refer a candidate
      description: >-
        Submit a candidate referral from an existing worker. Associates the
        referred candidate with a job requisition and records the referral
        source.
      tags:
        - Candidates
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - jobRequisition
                - referrer
              properties:
                jobRequisition:
                  $ref: '#/components/schemas/Reference'
                  description: Job requisition for the referral
                referrer:
                  $ref: '#/components/schemas/Reference'
                  description: Worker making the referral
                referralComments:
                  type: string
                  description: Comments from the referrer about the candidate
      responses:
        '201':
          description: Candidate referral submitted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /jobApplications:
    get:
      operationId: listJobApplications
      summary: Workday Recruiting List job applications
      description: >-
        Retrieve a collection of job applications with optional filtering by
        requisition, candidate, or status. Returns application details
        including current stage, disposition, and candidate reference.
      tags:
        - Job Applications
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - name: jobRequisition
          in: query
          description: >-
            Filter by job requisition Workday ID
          schema:
            type: string
        - name: candidate
          in: query
          description: >-
            Filter by candidate Workday ID
          schema:
            type: string
        - name: stage
          in: query
          description: >-
            Filter by current recruiting stage
          schema:
            type: string
            enum:
              - Review
              - Screen
              - Interview
              - Assessment
              - Offer
              - Background Check
              - Ready for Hire
              - Hired
      responses:
        '200':
          description: Job applications retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    description: Total number of matching job applications
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/JobApplication'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /jobApplications/{id}:
    get:
      operationId: getJobApplication
      summary: Workday Recruiting Get a job application
      description: >-
        Retrieve detailed information for a specific job application including
        candidate reference, job requisition, current recruiting stage,
        disposition status, and application history.
      tags:
        - Job Applications
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Job application retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobApplication'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /jobApplications/{id}/move:
    post:
      operationId: moveCandidateStage
      summary: Workday Recruiting Move candidate to a different stage
      description: >-
        Move a candidate to a different recruiting stage or disposition stage
        within a job application. Used to advance candidates through the hiring
        pipeline or to disposition candidates who are no longer being
        considered.
      tags:
        - Job Applications
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - stage
              properties:
                stage:
                  $ref: '#/components/schemas/Reference'
                  description: Target recruiting stage or disposition stage
                reason:
                  $ref: '#/components/schemas/Reference'
                  description: Reason for the stage transition
                comments:
                  type: string
                  description: Comments about the stage transition
      responses:
        '200':
          description: Candidate moved to new stage successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /jobApplications/{id}/offer:
    post:
      operationId: initiateOffer
      summary: Workday Recruiting Initiate an offer
      description: >-
        Initiate an employment offer for a job application. Triggers the offer
        approval workflow and generates the offer letter based on the
        configured template.
      tags:
        - Job Applications
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfferCreate'
      responses:
        '201':
          description: Offer initiated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Offer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /jobPostings:
    get:
      operationId: listJobPostings
      summary: Workday Recruiting List job postings
      description: >-
        Retrieve a collection of job postings with optional filtering by
        requisition, posting site, or status. Returns posting details
        including title, description, location, and posting dates.
      tags:
        - Job Postings
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - name: jobRequisition
          in: query
          description: >-
            Filter by job requisition Workday ID
          schema:
            type: string
        - name: postingSite
          in: query
          description: >-
            Filter by posting site Workday ID
          schema:
            type: string
        - name: active
          in: query
          description: >-
            Filter by active posting status
          schema:
            type: boolean
      responses:
        '200':
          description: Job postings retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    description: Total number of matching job postings
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/JobPosting'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /jobPostings/{id}:
    get:
      operationId: getJobPosting
      summary: Workday Recruiting Get a job posting
      description: >-
        Retrieve detailed information for a specific job posting including
        title, description, qualifications, location, compensation, posting
        dates, and associated job requisition.
      tags:
        - Job Postings
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Job posting retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobPosting'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateJobPosting
      summary: Workday Recruiting Update a job posting
      description: >-
        Update an existing job posting with new content, dates, or
        configuration. Can be used to modify the posting start and end dates.
      tags:
