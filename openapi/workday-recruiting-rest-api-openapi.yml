            - Hire
            - No Decision
            - Do Not Hire
            - Strong Do Not Hire
          description: Overall hiring recommendation
        competencyRatings:
          type: array
          items:
            type: object
            required:
              - competency
              - rating
            properties:
              competency:
                $ref: '#/components/schemas/Reference'
              rating:
                type: integer
                minimum: 1
                maximum: 5
