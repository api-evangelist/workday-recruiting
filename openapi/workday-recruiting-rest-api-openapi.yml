          $ref: '#/components/schemas/Reference'
          description: Candidate associated with this application
        jobRequisition:
          $ref: '#/components/schemas/Reference'
          description: Job requisition for this application
        currentStage:
          type: string
          enum:
            - Review
            - Screen
            - Interview
            - Assessment
            - Offer
            - Background Check
            - Ready for Hire
            - Hired
          description: Current recruiting stage
        dispositionReason:
          $ref: '#/components/schemas/Reference'
          description: Reason for disposition if the candidate was rejected
        isDispositioned:
          type: boolean
          description: Whether the candidate has been dispositioned
        source:
          $ref: '#/components/schemas/Reference'
          description: Application source
        appliedOn:
          type: string
          format: date-time
          description: Date and time the application was submitted
        updatedOn:
          type: string
          format: date-time
          description: Timestamp when the application was last updated
    Offer:
      type: object
      description: >-
        An employment offer extended to a candidate through a job application,
        including compensation details and start date.
