components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: >-
        OAuth 2.0 authentication. Register an API client in Workday, grant
        recruiting scopes, and obtain access tokens.
      flows:
        authorizationCode:
          authorizationUrl: https://{tenant}.workday.com/authorize
          tokenUrl: https://{tenant}.workday.com/ccx/oauth2/token
          scopes:
            recruiting:read: Read recruiting data
            recruiting:write: Modify recruiting data
  parameters:
    id:
      name: id
      in: path
      required: true
      description: Workday ID (WID) of the resource
      schema:
        type: string
    limit:
      name: limit
      in: query
      description: Maximum number of results to return per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    offset:
      name: offset
      in: query
      description: Number of results to skip for pagination
      schema:
        type: integer
        minimum: 0
        default: 0
  responses:
    BadRequest:
      description: Invalid request parameters or request body
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token expired
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Requested resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Reference:
      type: object
      description: A reference to a related Workday resource
      properties:
        id:
          type: string
          description: Workday ID (WID) of the referenced resource
        descriptor:
          type: string
          description: Display name of the referenced resource
    Error:
      type: object
      description: API error response
      properties:
        error:
          type: string
          description: Error code
        message:
          type: string
          description: Human-readable error message
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                description: Field that caused the error
              message:
                type: string
                description: Description of the field-level error
    JobRequisition:
      type: object
      description: >-
        A job requisition represents a hiring need for a specific position
        within an organization, including the job profile, number of openings,
        compensation range, and recruiting status.
      properties:
        id:
          type: string
          description: Workday ID (WID) uniquely identifying the job requisition
        requisitionNumber:
          type: string
          description: System-generated requisition reference number
        title:
          type: string
          description: Job requisition title
        status:
          type: string
          enum:
            - Open
            - Filled
            - Frozen
            - Closed
            - Draft
          description: Current status of the job requisition
        jobProfile:
          $ref: '#/components/schemas/Reference'
          description: Job profile associated with the requisition
        position:
          $ref: '#/components/schemas/Reference'
          description: Position associated with the requisition
        supervisoryOrganization:
          $ref: '#/components/schemas/Reference'
          description: Supervisory organization for the position
        hiringManager:
          $ref: '#/components/schemas/Reference'
          description: Worker designated as the hiring manager
        recruiter:
          $ref: '#/components/schemas/Reference'
          description: Assigned recruiter for the requisition
        numberOfOpenings:
          type: integer
          minimum: 1
          description: Number of positions to fill
        location:
          $ref: '#/components/schemas/Reference'
          description: Primary work location for the position
        workerType:
          $ref: '#/components/schemas/Reference'
          description: Worker type (e.g., Employee, Contingent Worker)
        timeType:
          type: string
          enum:
            - Full time
            - Part time
          description: Full-time or part-time designation
        targetHireDate:
          type: string
          format: date
          description: Target date for filling the position
        targetEndDate:
          type: string
          format: date
          description: Target end date for temporary positions
        compensationRange:
          type: object
          properties:
            minimum:
              type: number
              description: Minimum compensation amount
            maximum:
              type: number
              description: Maximum compensation amount
            currency:
              $ref: '#/components/schemas/Reference'
              description: Compensation currency
            frequency:
              type: string
              enum:
                - Annual
                - Hourly
                - Monthly
              description: Compensation frequency
          description: Compensation range for the position
        jobDescription:
          type: string
          description: Detailed job description
        qualifications:
          type: string
          description: Required qualifications for the position
        createdOn:
          type: string
          format: date-time
          description: Timestamp when the requisition was created
        updatedOn:
          type: string
          format: date-time
          description: Timestamp when the requisition was last updated
    JobRequisitionCreate:
      type: object
      description: Request body for creating or updating a job requisition
      required:
        - title
        - jobProfile
        - supervisoryOrganization
        - numberOfOpenings
      properties:
        title:
          type: string
          description: Job requisition title
        jobProfile:
          $ref: '#/components/schemas/Reference'
          description: Job profile to associate with the requisition
        position:
          $ref: '#/components/schemas/Reference'
          description: Existing position to associate with the requisition
        supervisoryOrganization:
          $ref: '#/components/schemas/Reference'
          description: Supervisory organization for the position
        hiringManager:
          $ref: '#/components/schemas/Reference'
          description: Worker to designate as the hiring manager
        recruiter:
          $ref: '#/components/schemas/Reference'
          description: Recruiter to assign to the requisition
        numberOfOpenings:
          type: integer
          minimum: 1
          description: Number of positions to fill
        location:
          $ref: '#/components/schemas/Reference'
          description: Primary work location
        workerType:
          $ref: '#/components/schemas/Reference'
          description: Worker type
        timeType:
          type: string
          enum:
            - Full time
            - Part time
          description: Full-time or part-time designation
        targetHireDate:
          type: string
          format: date
          description: Target date for filling the position
        jobDescription:
          type: string
          description: Detailed job description
        qualifications:
          type: string
          description: Required qualifications
    EvergreenRequisition:
      type: object
      description: >-
        An evergreen requisition represents an ongoing hiring need without
        a specific number of openings or close date, used to maintain a
        continuous candidate pipeline.
      properties:
        id:
          type: string
          description: Workday ID (WID) uniquely identifying the evergreen requisition
        requisitionNumber:
          type: string
          description: System-generated requisition reference number
        title:
          type: string
          description: Evergreen requisition title
        status:
          type: string
          enum:
            - Open
            - Closed
          description: Current status of the evergreen requisition
        jobProfile:
          $ref: '#/components/schemas/Reference'
          description: Job profile associated with the requisition
        supervisoryOrganization:
          $ref: '#/components/schemas/Reference'
          description: Supervisory organization
        hiringManager:
          $ref: '#/components/schemas/Reference'
          description: Hiring manager
        linkedJobRequisitions:
          type: array
          items:
            $ref: '#/components/schemas/Reference'
          description: Job requisitions linked to this evergreen requisition
        createdOn:
          type: string
          format: date-time
          description: Timestamp when the requisition was created
    EvergreenRequisitionCreate:
      type: object
      description: Request body for creating an evergreen requisition
      required:
        - title
        - jobProfile
        - supervisoryOrganization
      properties:
        title:
          type: string
          description: Evergreen requisition title
        jobProfile:
          $ref: '#/components/schemas/Reference'
          description: Job profile to associate
        supervisoryOrganization:
          $ref: '#/components/schemas/Reference'
          description: Supervisory organization
        hiringManager:
          $ref: '#/components/schemas/Reference'
          description: Hiring manager
    Candidate:
      type: object
      description: >-
        A candidate represents an individual being considered for employment,
        including their personal information, contact details, source, and
        associated job applications.
      properties:
        id:
          type: string
          description: Workday ID (WID) uniquely identifying the candidate
        firstName:
          type: string
          description: Candidate first name
        lastName:
          type: string
          description: Candidate last name
        fullName:
          type: string
          description: Candidate full display name
        email:
          type: string
          format: email
          description: Primary email address
        phone:
          type: string
          description: Primary phone number
        address:
          type: object
          properties:
            addressLine1:
              type: string
              description: Street address line 1
            addressLine2:
              type: string
              description: Street address line 2
            city:
              type: string
              description: City
            stateProvince:
              type: string
              description: State or province
            postalCode:
              type: string
              description: Postal or ZIP code
            country:
              $ref: '#/components/schemas/Reference'
              description: Country reference
          description: Candidate mailing address
        source:
          $ref: '#/components/schemas/Reference'
          description: Candidate source (e.g., Career Site, Referral, Agency)
        tags:
          type: array
          items:
            type: string
          description: Tags applied to the candidate record
        jobApplications:
          type: array
          items:
            $ref: '#/components/schemas/Reference'
          description: Job applications associated with this candidate
        isInternal:
          type: boolean
          description: Whether the candidate is an existing Workday worker
        createdOn:
          type: string
          format: date-time
          description: Timestamp when the candidate record was created
        updatedOn:
          type: string
          format: date-time
          description: Timestamp when the candidate was last updated
    CandidateCreate:
      type: object
      description: Request body for creating or updating a candidate
      required:
        - firstName
        - lastName
        - email
      properties:
        firstName:
          type: string
          description: Candidate first name
        lastName:
          type: string
          description: Candidate last name
        email:
          type: string
          format: email
          description: Primary email address
        phone:
          type: string
          description: Primary phone number
        address:
          type: object
          properties:
            addressLine1:
              type: string
            addressLine2:
              type: string
            city:
              type: string
            stateProvince:
              type: string
            postalCode:
              type: string
            country:
              $ref: '#/components/schemas/Reference'
