components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: >-
        OAuth 2.0 authentication. Register an API client in Workday, grant
        recruiting scopes, and obtain access tokens.
      flows:
        authorizationCode:
          authorizationUrl: https://{tenant}.workday.com/authorize
          tokenUrl: https://{tenant}.workday.com/ccx/oauth2/token
          scopes:
            recruiting:read: Read recruiting data
            recruiting:write: Modify recruiting data
  parameters:
    id:
      name: id
      in: path
      required: true
      description: Workday ID (WID) of the resource
      schema:
        type: string
      example: 11111111-2222-3333-4444-555555555555
    limit:
      name: limit
      in: query
      description: Maximum number of results to return per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      example: 20
    offset:
      name: offset
      in: query
      description: Number of results to skip for pagination
      schema:
        type: integer
        minimum: 0
        default: 0
      example: 0
  responses:
    BadRequest:
      description: Invalid request parameters or request body
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token expired
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Requested resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Reference:
      type: object
      description: A reference to a related Workday resource
      properties:
        id:
          type: string
          description: Workday ID (WID) of the referenced resource
          example: 11111111-2222-3333-4444-555555555555
        descriptor:
          type: string
          description: Display name of the referenced resource
          example: Senior Software Engineer
    Error:
      type: object
      description: API error response
      properties:
        error:
          type: string
          description: Error code
          example: string
        message:
          type: string
          description: Human-readable error message
          example: string
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                description: Field that caused the error
                example: string
              message:
                type: string
                description: Description of the field-level error
                example: string
    JobRequisition:
      type: object
      description: >-
        A job requisition represents a hiring need for a specific position
        within an organization, including the job profile, number of openings,
        compensation range, and recruiting status.
      properties:
        id:
          type: string
          description: Workday ID (WID) uniquely identifying the job requisition
          example: 11111111-2222-3333-4444-555555555555
        requisitionNumber:
          type: string
          description: System-generated requisition reference number
          example: REQ-100245
        title:
          type: string
          description: Job requisition title
          example: Senior Software Engineer
        status:
          type: string
          enum:
          - Open
          - Filled
          - Frozen
          - Closed
          - Draft
          description: Current status of the job requisition
          example: Open
        jobProfile:
          $ref: '#/components/schemas/Reference'
          description: Job profile associated with the requisition
        position:
          $ref: '#/components/schemas/Reference'
          description: Position associated with the requisition
        supervisoryOrganization:
          $ref: '#/components/schemas/Reference'
          description: Supervisory organization for the position
        hiringManager:
          $ref: '#/components/schemas/Reference'
          description: Worker designated as the hiring manager
        recruiter:
          $ref: '#/components/schemas/Reference'
          description: Assigned recruiter for the requisition
        numberOfOpenings:
          type: integer
          minimum: 1
          description: Number of positions to fill
          example: 3
        location:
          $ref: '#/components/schemas/Reference'
          description: Primary work location for the position
        workerType:
          $ref: '#/components/schemas/Reference'
          description: Worker type (e.g., Employee, Contingent Worker)
        timeType:
          type: string
          enum:
          - Full time
          - Part time
          description: Full-time or part-time designation
          example: Full time
        targetHireDate:
          type: string
          format: date
          description: Target date for filling the position
          example: '2026-05-03'
        targetEndDate:
          type: string
          format: date
          description: Target end date for temporary positions
          example: '2026-05-03'
        compensationRange:
          type: object
          properties:
            minimum:
              type: number
              description: Minimum compensation amount
              example: 95000.0
            maximum:
              type: number
              description: Maximum compensation amount
              example: 145000.0
            currency:
              $ref: '#/components/schemas/Reference'
              description: Compensation currency
            frequency:
              type: string
              enum:
              - Annual
              - Hourly
              - Monthly
              description: Compensation frequency
              example: Annual
          description: Compensation range for the position
        jobDescription:
          type: string
          description: Detailed job description
          example: Strong technical background with 8+ years of experience in distributed systems.
        qualifications:
          type: string
          description: Required qualifications for the position
          example: Bachelor's degree in Computer Science or equivalent experience; 5+ years of professional software development.
        createdOn:
          type: string
          format: date-time
          description: Timestamp when the requisition was created
          example: '2026-05-03T14:30:00Z'
        updatedOn:
          type: string
          format: date-time
          description: Timestamp when the requisition was last updated
          example: '2026-05-03T14:30:00Z'
    JobRequisitionCreate:
      type: object
      description: Request body for creating or updating a job requisition
      required:
      - title
      - jobProfile
      - supervisoryOrganization
      - numberOfOpenings
      properties:
        title:
          type: string
          description: Job requisition title
          example: Senior Software Engineer
        jobProfile:
          $ref: '#/components/schemas/Reference'
          description: Job profile to associate with the requisition
        position:
          $ref: '#/components/schemas/Reference'
          description: Existing position to associate with the requisition
        supervisoryOrganization:
          $ref: '#/components/schemas/Reference'
          description: Supervisory organization for the position
        hiringManager:
          $ref: '#/components/schemas/Reference'
          description: Worker to designate as the hiring manager
        recruiter:
          $ref: '#/components/schemas/Reference'
          description: Recruiter to assign to the requisition
        numberOfOpenings:
          type: integer
          minimum: 1
          description: Number of positions to fill
          example: 3
        location:
          $ref: '#/components/schemas/Reference'
          description: Primary work location
        workerType:
          $ref: '#/components/schemas/Reference'
          description: Worker type
        timeType:
          type: string
          enum:
          - Full time
          - Part time
          description: Full-time or part-time designation
          example: Full time
        targetHireDate:
          type: string
          format: date
          description: Target date for filling the position
          example: '2026-05-03'
        jobDescription:
          type: string
          description: Detailed job description
          example: Strong technical background with 8+ years of experience in distributed systems.
        qualifications:
          type: string
          description: Required qualifications
          example: Bachelor's degree in Computer Science or equivalent experience; 5+ years of professional software development.
    EvergreenRequisition:
      type: object
      description: >-
        An evergreen requisition represents an ongoing hiring need without
        a specific number of openings or close date, used to maintain a
        continuous candidate pipeline.
      properties:
        id:
          type: string
          description: Workday ID (WID) uniquely identifying the evergreen requisition
          example: 11111111-2222-3333-4444-555555555555
        requisitionNumber:
          type: string
          description: System-generated requisition reference number
          example: REQ-100245
        title:
          type: string
          description: Evergreen requisition title
          example: Senior Software Engineer
        status:
          type: string
          enum:
          - Open
          - Closed
          description: Current status of the evergreen requisition
          example: Open
        jobProfile:
          $ref: '#/components/schemas/Reference'
          description: Job profile associated with the requisition
        supervisoryOrganization:
          $ref: '#/components/schemas/Reference'
          description: Supervisory organization
        hiringManager:
          $ref: '#/components/schemas/Reference'
          description: Hiring manager
        linkedJobRequisitions:
          type: array
          items:
            $ref: '#/components/schemas/Reference'
          description: Job requisitions linked to this evergreen requisition
        createdOn:
          type: string
          format: date-time
          description: Timestamp when the requisition was created
          example: '2026-05-03T14:30:00Z'
    EvergreenRequisitionCreate:
      type: object
      description: Request body for creating an evergreen requisition
      required:
      - title
      - jobProfile
      - supervisoryOrganization
      properties:
        title:
          type: string
          description: Evergreen requisition title
          example: Senior Software Engineer
        jobProfile:
          $ref: '#/components/schemas/Reference'
          description: Job profile to associate
        supervisoryOrganization:
          $ref: '#/components/schemas/Reference'
          description: Supervisory organization
        hiringManager:
          $ref: '#/components/schemas/Reference'
          description: Hiring manager
    Candidate:
      type: object
      description: >-
        A candidate represents an individual being considered for employment,
        including their personal information, contact details, source, and
        associated job applications.
      properties:
        id:
          type: string
          description: Workday ID (WID) uniquely identifying the candidate
          example: 11111111-2222-3333-4444-555555555555
        firstName:
          type: string
          description: Candidate first name
          example: Jordan
        lastName:
          type: string
          description: Candidate last name
          example: Reyes
        fullName:
          type: string
          description: Candidate full display name
          example: Jordan Reyes
        email:
          type: string
          format: email
          description: Primary email address
          example: candidate@example.com
        phone:
          type: string
          description: Primary phone number
          example: +1-415-555-0123
        address:
          type: object
          properties:
            addressLine1:
              type: string
              description: Street address line 1
              example: 123 Market Street
            addressLine2:
              type: string
              description: Street address line 2
              example: 123 Market Street
            city:
              type: string
              description: City
              example: San Francisco
            stateProvince:
              type: string
              description: State or province
              example: CA
            postalCode:
              type: string
              description: Postal or ZIP code
              example: '94105'
            country:
              $ref: '#/components/schemas/Reference'
              description: Country reference
          description: Candidate mailing address
        source:
          $ref: '#/components/schemas/Reference'
          description: Candidate source (e.g., Career Site, Referral, Agency)
        tags:
          type: array
          items:
            type: string
          description: Tags applied to the candidate record
        jobApplications:
          type: array
          items:
            $ref: '#/components/schemas/Reference'
          description: Job applications associated with this candidate
        isInternal:
          type: boolean
          description: Whether the candidate is an existing Workday worker
          example: false
        createdOn:
          type: string
          format: date-time
          description: Timestamp when the candidate record was created
          example: '2026-05-03T14:30:00Z'
        updatedOn:
          type: string
          format: date-time
          description: Timestamp when the candidate was last updated
          example: '2026-05-03T14:30:00Z'
    CandidateCreate:
      type: object
      description: Request body for creating or updating a candidate
      required:
      - firstName
      - lastName
      - email
      properties:
        firstName:
          type: string
          description: Candidate first name
          example: Jordan
        lastName:
          type: string
          description: Candidate last name
          example: Reyes
        email:
          type: string
          format: email
          description: Primary email address
          example: candidate@example.com
        phone:
          type: string
          description: Primary phone number
          example: +1-415-555-0123
        address:
          type: object
          properties:
            addressLine1:
              type: string
              example: 123 Market Street
            addressLine2:
              type: string
              example: 123 Market Street
            city:
              type: string
              example: San Francisco
            stateProvince:
              type: string
              example: CA
            postalCode:
              type: string
              example: '94105'
            country:
              $ref: '#/components/schemas/Reference'
          description: Candidate mailing address
        source:
          $ref: '#/components/schemas/Reference'
          description: Candidate source
    CandidateAssessment:
      type: object
      description: >-
        A candidate assessment captures evaluation results from screening
        tools or manual review processes during the recruiting workflow.
      properties:
        id:
          type: string
          description: Workday ID (WID) of the assessment
          example: 11111111-2222-3333-4444-555555555555
        assessmentCategory:
          $ref: '#/components/schemas/Reference'
          description: Assessment category
        result:
          type: string
          enum:
          - Pass
          - Fail
          - Pending
          description: Assessment outcome
          example: Pass
        score:
          type: number
          description: Numeric assessment score
          example: 87.5
        comments:
          type: string
          description: Assessment comments or notes
          example: Strong technical background with 8+ years of experience in distributed systems.
        assessedOn:
          type: string
          format: date-time
          description: Date and time the assessment was completed
          example: '2026-05-03T14:30:00Z'
    Attachment:
      type: object
      description: A file attachment associated with a candidate or job application
      properties:
        id:
          type: string
          description: Workday ID (WID) of the attachment
          example: 11111111-2222-3333-4444-555555555555
        fileName:
          type: string
          description: Original file name
          example: resume.pdf
        category:
          type: string
          enum:
          - Resume
          - Cover Letter
          - Portfolio
          - Other
          description: Attachment category
          example: Resume
        contentType:
          type: string
          description: MIME type of the attachment
          example: Full time
        fileSize:
          type: integer
          description: File size in bytes
          example: 245678
        uploadedOn:
          type: string
          format: date-time
          description: Timestamp when the attachment was uploaded
          example: '2026-05-03T14:30:00Z'
    JobApplication:
      type: object
      description: >-
        A job application links a candidate to a job requisition and tracks
        their progress through the recruiting stages from application through
        hire or disposition.
      properties:
        id:
          type: string
          description: Workday ID (WID) uniquely identifying the job application
          example: 11111111-2222-3333-4444-555555555555
        candidate:
          $ref: '#/components/schemas/Reference'
          description: Candidate associated with this application
        jobRequisition:
          $ref: '#/components/schemas/Reference'
          description: Job requisition for this application
        currentStage:
          type: string
          enum:
          - Review
          - Screen
          - Interview
          - Assessment
          - Offer
          - Background Check
          - Ready for Hire
          - Hired
          description: Current recruiting stage
          example: Review
        dispositionReason:
          $ref: '#/components/schemas/Reference'
          description: Reason for disposition if the candidate was rejected
        isDispositioned:
          type: boolean
          description: Whether the candidate has been dispositioned
          example: false
        source:
          $ref: '#/components/schemas/Reference'
          description: Application source
        appliedOn:
          type: string
          format: date-time
          description: Date and time the application was submitted
          example: '2026-05-03T14:30:00Z'
        updatedOn:
          type: string
          format: date-time
          description: Timestamp when the application was last updated
          example: '2026-05-03T14:30:00Z'
    Offer:
      type: object
      description: >-
        An employment offer extended to a candidate through a job application,
        including compensation details and start date.
      properties:
        id:
          type: string
          description: Workday ID (WID) of the offer
          example: 11111111-2222-3333-4444-555555555555
        jobApplication:
          $ref: '#/components/schemas/Reference'
          description: Job application associated with the offer
        status:
          type: string
          enum:
          - Draft
          - Pending Approval
          - Approved
          - Extended
          - Accepted
          - Declined
          - Rescinded
          description: Current offer status
          example: Draft
        proposedStartDate:
          type: string
          format: date
          description: Proposed start date for employment
          example: '2026-05-03'
        compensationAmount:
          type: number
          description: Offered compensation amount
          example: 120000.0
        compensationFrequency:
          type: string
          enum:
          - Annual
          - Hourly
          - Monthly
          description: Compensation frequency
          example: Annual
        currency:
          $ref: '#/components/schemas/Reference'
          description: Compensation currency
        expirationDate:
          type: string
          format: date
          description: Date the offer expires
          example: '2026-05-03'
        createdOn:
          type: string
          format: date-time
          description: Timestamp when the offer was created
          example: '2026-05-03T14:30:00Z'
    OfferCreate:
