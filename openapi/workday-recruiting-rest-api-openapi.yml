        id:
          type: string
          description: Workday ID (WID) of the offer
        jobApplication:
          $ref: '#/components/schemas/Reference'
          description: Job application associated with the offer
        status:
          type: string
          enum:
            - Draft
            - Pending Approval
            - Approved
            - Extended
            - Accepted
            - Declined
            - Rescinded
          description: Current offer status
        proposedStartDate:
          type: string
          format: date
          description: Proposed start date for employment
        compensationAmount:
          type: number
          description: Offered compensation amount
        compensationFrequency:
          type: string
          enum:
            - Annual
            - Hourly
            - Monthly
          description: Compensation frequency
        currency:
          $ref: '#/components/schemas/Reference'
          description: Compensation currency
        expirationDate:
          type: string
          format: date
          description: Date the offer expires
        createdOn:
          type: string
          format: date-time
          description: Timestamp when the offer was created
    OfferCreate:
      type: object
      description: Request body for initiating an employment offer
      required:
        - proposedStartDate
      properties:
        proposedStartDate:
          type: string
          format: date
          description: Proposed start date for employment
        compensationAmount:
          type: number
          description: Offered compensation amount
        compensationFrequency:
          type: string
          enum:
            - Annual
            - Hourly
            - Monthly
          description: Compensation frequency
        currency:
          $ref: '#/components/schemas/Reference'
          description: Compensation currency
        expirationDate:
          type: string
          format: date
          description: Date the offer expires
    JobPosting:
      type: object
      description: >-
        A job posting is a public-facing representation of a job requisition
        published to internal or external career sites for candidate
        attraction.
      properties:
        id:
          type: string
          description: Workday ID (WID) uniquely identifying the job posting
        title:
          type: string
          description: Job posting title
        jobRequisition:
          $ref: '#/components/schemas/Reference'
          description: Job requisition associated with the posting
        postingSite:
          $ref: '#/components/schemas/Reference'
          description: Career site where the job is posted
        description:
          type: string
          description: Full job posting description including responsibilities
        qualifications:
          type: string
          description: Required qualifications and skills
        location:
          $ref: '#/components/schemas/Reference'
          description: Primary work location
        compensationRange:
          type: object
          properties:
            minimum:
              type: number
              description: Minimum compensation amount
            maximum:
              type: number
              description: Maximum compensation amount
            currency:
              $ref: '#/components/schemas/Reference'
            frequency:
              type: string
              enum:
                - Annual
                - Hourly
                - Monthly
