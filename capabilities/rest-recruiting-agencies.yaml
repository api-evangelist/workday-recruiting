naftiko: 1.0.0-alpha2
info:
  label: Workday Recruiting REST API — Recruiting Agencies
  description: 'Workday Recruiting REST API — Recruiting Agencies. 3 operations. Lead operation: Workday Recruiting List Recruiting
    Agencies. Self-contained Naftiko capability covering one Workday Recruiting business surface.'
  tags:
  - Workday Recruiting
  - Recruiting Agencies
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_RECRUITING_API_KEY: WORKDAY_RECRUITING_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-recruiting-agencies
    baseUri: https://{tenant}.workday.com/ccx/api/recruiting/v41.2
    description: Workday Recruiting REST API — Recruiting Agencies business capability. Self-contained, no shared references.
    resources:
    - name: recruitingAgencies
      path: /recruitingAgencies
      operations:
      - name: listrecruitingagencies
        method: GET
        description: Workday Recruiting List Recruiting Agencies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: recruitingAgencies-id
      path: /recruitingAgencies/{id}
      operations:
      - name: getrecruitingagency
        method: GET
        description: Workday Recruiting Get a Recruiting Agency
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: recruitingAgencies-id-candidates
      path: /recruitingAgencies/{id}/candidates
      operations:
      - name: submitagencycandidate
        method: POST
        description: Workday Recruiting Submit an Agency Candidate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WORKDAY_RECRUITING_API_KEY}}'
  exposes:
  - type: rest
    namespace: rest-recruiting-agencies-rest
    port: 8080
    description: REST adapter for Workday Recruiting REST API — Recruiting Agencies. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/recruitingagencies
      name: recruitingagencies
      description: REST surface for recruitingAgencies.
      operations:
      - method: GET
        name: listrecruitingagencies
        description: Workday Recruiting List Recruiting Agencies
        call: rest-recruiting-agencies.listrecruitingagencies
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/recruitingagencies/{id}
      name: recruitingagencies-id
      description: REST surface for recruitingAgencies-id.
      operations:
      - method: GET
        name: getrecruitingagency
        description: Workday Recruiting Get a Recruiting Agency
        call: rest-recruiting-agencies.getrecruitingagency
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/recruitingagencies/{id}/candidates
      name: recruitingagencies-id-candidates
      description: REST surface for recruitingAgencies-id-candidates.
      operations:
      - method: POST
        name: submitagencycandidate
        description: Workday Recruiting Submit an Agency Candidate
        call: rest-recruiting-agencies.submitagencycandidate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-recruiting-agencies-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Recruiting REST API — Recruiting Agencies. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: workday-recruiting-list-recruiting-agencies
      description: Workday Recruiting List Recruiting Agencies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-recruiting-agencies.listrecruitingagencies
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-recruiting-get-recruiting-agency
      description: Workday Recruiting Get a Recruiting Agency
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-recruiting-agencies.getrecruitingagency
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-recruiting-submit-agency-candidate
      description: Workday Recruiting Submit an Agency Candidate
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-recruiting-agencies.submitagencycandidate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
