naftiko: 1.0.0-alpha2
info:
  label: Workday Recruiting REST API — Positions
  description: 'Workday Recruiting REST API — Positions. 2 operations. Lead operation: Workday Recruiting List Positions.
    Self-contained Naftiko capability covering one Workday Recruiting business surface.'
  tags:
  - Workday Recruiting
  - Positions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_RECRUITING_API_KEY: WORKDAY_RECRUITING_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-positions
    baseUri: https://{tenant}.workday.com/ccx/api/recruiting/v41.2
    description: Workday Recruiting REST API — Positions business capability. Self-contained, no shared references.
    resources:
    - name: positions
      path: /positions
      operations:
      - name: listpositions
        method: GET
        description: Workday Recruiting List Positions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createposition
        method: POST
        description: Workday Recruiting Create a Position
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WORKDAY_RECRUITING_API_KEY}}'
  exposes:
  - type: rest
    namespace: rest-positions-rest
    port: 8080
    description: REST adapter for Workday Recruiting REST API — Positions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/positions
      name: positions
      description: REST surface for positions.
      operations:
      - method: GET
        name: listpositions
        description: Workday Recruiting List Positions
        call: rest-positions.listpositions
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createposition
        description: Workday Recruiting Create a Position
        call: rest-positions.createposition
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-positions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Recruiting REST API — Positions. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: workday-recruiting-list-positions
      description: Workday Recruiting List Positions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-positions.listpositions
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-recruiting-create-position
      description: Workday Recruiting Create a Position
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-positions.createposition
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
