    description: Workday Recruiting REST API — Configuration business capability. Self-contained, no shared references.
    resources:
    - name: jobPostingSites
      path: /jobPostingSites
      operations:
      - name: listjobpostingsites
        method: GET
        description: Workday Recruiting List Job Posting Sites
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
