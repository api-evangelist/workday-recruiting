      name: jobpostingsites
      description: REST surface for jobPostingSites.
      operations:
      - method: GET
        name: listjobpostingsites
        description: Workday Recruiting List Job Posting Sites
        call: rest-configuration.listjobpostingsites
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/questionnaires
      name: questionnaires
      description: REST surface for questionnaires.
      operations:
      - method: GET
        name: listquestionnaires
        description: Workday Recruiting List Questionnaires
        call: rest-configuration.listquestionnaires
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/veteranstatuses
