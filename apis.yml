  - type: Features
    data:
      - name: Job Requisition Management
        description: >-
          Create, edit, close, freeze, and reopen job requisitions for open
          positions, with full lifecycle and approval workflow support.
      - name: Evergreen Requisitions
        description: >-
          Manage ongoing requisitions used for continuous hiring needs without
          a specific number of openings or close date.
      - name: Candidate Management
        description: >-
          Create, retrieve, and update candidate profiles including personal
          information, attachments, photos, and assessment data.
      - name: Job Application Lifecycle
        description: >-
          Manage applications from submission through disposition, including
          stage movement, advancement, and offer initiation.
      - name: Job Posting Distribution
        description: >-
          Post, update, and unpost jobs to internal and external career sites
          and manage job posting site brands and configurations.
      - name: Interview Scheduling
        description: >-
          Schedule interviews, submit interview feedback, configure interview
          settings, and manage self-schedule calendars.
      - name: Background Check Integration
        description: >-
          Submit and retrieve background check results and manage background
          check packages for candidate screening.
      - name: Recruiting Agency Workflows
        description: >-
          Manage agency relationships, agency users, and agency candidate
          submissions tied to job requisitions.
      - name: High-Volume Applicant Import
        description: >-
          Bulk applicant import operations to support high-volume hiring and
          third-party sourcing pipelines.
      - name: Position Management
        description: >-
          Create and manage positions and position restrictions within the
          position management staffing model.
      - name: Recruiting Configuration
        description: >-
          Manage recruiting configuration including questionnaires, assessment
          categories, veteran statuses, site brands, and regions.
      - name: OAuth 2.0 Authentication
        description: >-
          Standards-based OAuth 2.0 authentication for secure programmatic
          access to recruiting data.
      - name: SOAP Web Services
        description: >-
          Comprehensive SOAP web services with over 120 recruiting operations
          for deep enterprise integration.
  - type: UseCases
    data:
      - name: Applicant Tracking System Integration
        description: >-
          Sync requisitions, candidates, and applications between Workday and
          third-party ATS or CRM platforms.
      - name: Talent Sourcing Automation
        description: >-
          Push candidates from sourcing tools and job boards into Workday
          requisition pipelines.
      - name: Job Board Distribution
        description: >-
          Automatically distribute Workday job postings to external job boards
          and career site networks.
      - name: Background Screening Workflow
        description: >-
          Trigger and ingest background check results from screening vendors
          tied to candidate stages.
      - name: Interview Coordination
        description: >-
          Integrate with calendar and scheduling tools to coordinate
          interviewer availability and candidate self-scheduling.
      - name: Assessment and Skills Testing
        description: >-
          Connect Workday Recruiting to assessment platforms for skills,
          behavioral, and technical evaluations.
      - name: Hiring Analytics and Reporting
        description: >-
          Extract recruiting data for reporting in BI tools, data warehouses,
          and people analytics platforms.
      - name: Onboarding Handoff
        description: >-
          Trigger onboarding workflows in HRIS or onboarding platforms upon
          requisition fill or hire stage.
      - name: Recruiting Agency Submissions
        description: >-
          Enable third-party staffing agencies to submit candidates directly
          into Workday requisitions.
      - name: Compliance and EEO Reporting
        description: >-
          Capture self-identification data and applicant flow logs to satisfy
          EEO, OFCCP, and regional reporting requirements.
      - name: Internal Mobility
        description: >-
          Connect internal career site workflows to surface roles to existing
          employees.
      - name: High-Volume Hiring
        description: >-
          Power retail, hospitality, and seasonal hiring with bulk applicant
          import and rapid-disposition workflows.
  - type: Integrations
    data:
      - name: Workday HCM
        description: >-
          Native integration with Workday Human Capital Management for
          seamless transition from candidate to employee.
      - name: LinkedIn Talent Solutions
        description: >-
          Connect with LinkedIn Recruiter and LinkedIn Job Postings for
          sourcing and posting workflows.
      - name: Indeed
        description: >-
          Distribute Workday job postings to Indeed and ingest applications
          back into Workday.
      - name: HireRight
        description: >-
          Background check integration for criminal, employment, and
          education verification.
      - name: Sterling
        description: >-
          Background screening, drug testing, and identity verification
          integration.
      - name: HackerRank
        description: >-
          Technical assessment integration for engineering and developer
          hiring pipelines.
      - name: Calendly
        description: >-
          Self-schedule interview integration for candidate-driven scheduling.
      - name: Microsoft Outlook and Teams
        description: >-
          Calendar and meeting integration for interview scheduling and
          coordination.
      - name: Google Workspace
        description: >-
          Calendar and meeting integration for interview scheduling.
      - name: DocuSign
        description: >-
          E-signature integration for offer letter and onboarding document
          workflows.
      - name: Workday Marketplace Partners
        description: >-
          Pre-built integrations with talent acquisition vendors listed in
          the Workday Marketplace.
  - type: Solutions
    data:
      - name: Workday Talent Acquisition
        description: >-
          End-to-end recruiting solution from sourcing through hire,
          unifying recruiting with the broader Workday HCM platform.
      - name: HiredScore AI for Recruiting
        description: >-
          AI-driven candidate matching, screening, and recruiter productivity
          embedded in Workday Recruiting.
      - name: Workday Onboarding
        description: >-
          Native onboarding handoff that converts hires into engaged
          employees inside the Workday HCM system of record.
      - name: Workday Skills Cloud
        description: >-
          Skills-driven hiring leveraging the Workday skills ontology across
          requisitions and candidate profiles.
